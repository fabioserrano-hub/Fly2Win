<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D4AF37" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fly2Win" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- SEO -->
    <title>Fly2Win — Gestão Columbófila Premium</title>
    <meta name="description" content="Plataforma premium de gestão columbófila. Pombos, provas, pedigree, saúde, reprodução e comunidade." />
    <meta property="og:title" content="Fly2Win" />
    <meta property="og:description" content="Gestão Columbófila Premium" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <script>
      // Aplicar tema antes do React para evitar flash
      try {
        var t = localStorage.getItem('cl_tema') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
        document.documentElement.style.background = t === 'light' ? '#F0F4F8' : '#050D1A'
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Registar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registado:', reg.scope))
            .catch(err => console.log('SW erro:', err))
        })
      }
    </script>
    <script>
      // Capturar erros globais
      window.__erros = []
      window.onerror = function(msg, src, line, col, err) {
        window.__erros.push({msg, src, line, col, stack: err?.stack})
        mostrarDiagnostico()
      }
      window.addEventListener('unhandledrejection', function(e) {
        window.__erros.push({msg: String(e.reason), tipo: 'promise'})
        mostrarDiagnostico()
      })

      function limparESair() {
        try {
          // Limpar tokens Supabase
          Object.keys(localStorage).forEach(function(k) {
            if (k.includes('supabase') || k.includes('sb-') || k.includes('auth')) {
              localStorage.removeItem(k)
            }
          })
          localStorage.removeItem('cl_tema')
          sessionStorage.clear()
        } catch(e) {}
        location.reload()
      }

      function mostrarDiagnostico() {
        if (document.getElementById('cl-diagnostico')) return
        var div = document.createElement('div')
        div.id = 'cl-diagnostico'
        div.style.cssText = 'position:fixed;inset:0;background:#050D1A;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;font-family:sans-serif'
        var erros = window.__erros.map(function(e){ return e.msg }).join('\n').slice(0,200)
        div.innerHTML = '<div style="font-size:36px">🕊️</div>'
          + '<div style="color:#fff;font-size:15px;font-weight:600;text-align:center">Fly2Win — Erro ao carregar</div>'
          + (erros ? '<div style="color:#f87171;font-size:11px;background:#101F40;padding:8px 12px;border-radius:8px;max-width:320px;word-break:break-all;text-align:left">' + erros + '</div>' : '')
          + '<button onclick="limparESair()" style="background:#1E5FD9;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">🔄 Limpar sessão e recarregar</button>'
          + '<div style="color:#475569;font-size:11px;text-align:center">Se o problema persistir,<br>tenta noutro browser ou em modo privado</div>'
        document.body.appendChild(div)
      }

      // Mostrar diagnóstico se app não carregar em 6 segundos
      setTimeout(function() {
        var root = document.getElementById('root')
        if (!root || !root.firstChild) mostrarDiagnostico()
      }, 6000)
    </script>
  </body>
</html>
